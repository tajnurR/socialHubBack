# =============================================================================
# SocialHub backend - base configuration (shared across all profiles)
# Profile-specific overrides live in application-dev.yml / application-prod.yml.
# All secrets/credentials come from environment variables (see .env.example).
# =============================================================================
spring:
  application:
    name: socialhub-backend
  profiles:
    # Active profile is chosen via SPRING_PROFILES_ACTIVE; defaults to dev locally.
    default: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/socialhub}
    username: ${DB_USERNAME:tajnur}
    password: ${DB_PASSWORD:abc@123}
    hikari:
      pool-name: SocialHubHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    # Schema is owned by Flyway; Hibernate only validates that entities match it.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Application-specific, type-safe config (bound in com...config.AppProperties).
app:
  cors:
    # Comma-separated origins. Defaults to the Angular dev server.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  security:
    # TODO[SSO]: flip to true and configure an OAuth2/OIDC resource server.
    # While false, SecurityConfig permits all requests so development isn't blocked.
    enabled: false
  crypto:
    # Secret used to encrypt integration access tokens at rest (AES-GCM).
    # MUST be overridden with a strong, stable value per environment in prod.
    secret: ${APP_ENCRYPTION_SECRET:change-me-dev-secret-please-rotate}
  tenant:
    # Dev fallback user + organization (seeded by Flyway) used by CurrentUserProvider.
    # TODO[SSO]: user + org will come from the authenticated principal instead.
    default-organization-id: ${DEFAULT_ORGANIZATION_ID:1}
    default-user-id: ${DEFAULT_USER_ID:1}
  integration:
    facebook:
      graph-base-url: ${FACEBOOK_GRAPH_BASE_URL:https://graph.facebook.com}
      api-version: ${FACEBOOK_GRAPH_API_VERSION:v25.0}
      # OAuth (Facebook Login). app-secret is server-side only; never expose it.
      app-id: ${FACEBOOK_APP_ID:1435931321914155}
      app-secret: ${FACEBOOK_APP_SECRET:05343069cf6b9fe38ecb75b5cf8eb57e}
      redirect-uri: ${FACEBOOK_REDIRECT_URI:http://localhost:4200/settings/social-integrations}
      scopes: ${FACEBOOK_SCOPES:pages_show_list,pages_read_engagement,pages_manage_posts,pages_read_user_content}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.socialhub: INFO
