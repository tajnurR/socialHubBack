# Test profile: in-memory H2 (PostgreSQL compatibility mode) so the Spring
# context can load without a real database. Schema is generated by Hibernate
# (Flyway disabled here because the migrations target PostgreSQL).
spring:
  datasource:
    url: jdbc:h2:mem:socialhub;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
